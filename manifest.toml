#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2
id = "papra"
name = "Papra"
description.en = "Document archiving platform"
description.fr = "Plateforme d'archivage de documents"
version = "26.2.0~ynh3"

maintainers = ["otm33GH"]

[upstream]
license = "GPL-3.0-only"
website = "https://papra.app/fr/"
demo = "https://demo.papra.app/"
admindoc = "https://docs.papra.app/"
code = "https://github.com/papra-hq/papra"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "2000M"
ram.build = "1500M"
ram.runtime = "500M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.language]
    ask.en = "Choose the OCR language"
    ask.fr = "Choisissez la langue pour l'OCR"
    type = "select"
    choices = ["fra", "cat", "dan", "deu", "eng", "eus", "fin", "glg", "ita", "nld", "nor", "pol", "port", "ron", "rus", "spa", "slv", "tur", "ukr"]
    default = "fra"

    [install.email_verification]
    type = "boolean"
    ask.en = "Allow email verification?"
    ask.fr = "Activer la confirmation de l'e-mail ?"
    default = true

    [install.doc_storage_driver]
    ask.en = "Storage driver"
    ask.fr = "Storage driver"
    type = "select"
    choices = ["filesystem", "s3", "in-memory", "azure-blob"]
    default = "filesystem"

[resources]
    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/papra-hq/papra/archive/refs/tags/@papra/app@26.2.1.tar.gz"
    sha256 = "587cbb0057187922f90c6854e62dc9c04fcdf10e8f92bb9dd20aca0692d0fd83"
    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]
	allow_email = true
    
    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
    main.auth_header = false

    [resources.ports]

    [resources.nodejs]
    version = "24"
    
