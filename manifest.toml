#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2
id = "vitransfer"
name = "ViTransfer"
description.en = "Video Sharing"
description.fr = "Partage de vidéos"
version = "0.9.6~ynh1"

maintainers = ["otm33GH"]

[upstream]
license = "GPL-3.0-only"
website = "https://vitransfer.com"
admindoc = "https://www.vitransfer.com/docs"
code = "https://github.com/MansiVisuals/ViTransfer"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "2000M"
ram.build = "1500M"
ram.runtime = "500M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.admin_password]
    type = "password"

[resources]
    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/papra-hq/papra/archive/refs/tags/@papra/app@26.2.1.tar.gz"
    sha256 = "587cbb0057187922f90c6854e62dc9c04fcdf10e8f92bb9dd20aca0692d0fd83"
    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]
	allow_email = true
    
    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
    main.auth_header = false

    [resources.ports]

    [resources.apt]
    packages = [
        "ffmpeg", 
        "ffmpeg-libs", 
        "fontconfig", 
        "redis-server", 
        "postgresql", 
        "fonts-dejavu",
        "ca-certificates",
        "libssl-dev", 
        "libsndfile1", 
        "giflib-tools", 
        "libgif-dev", 
        "libgif7", 
        "liborc-0.4-dev",
        "libcjson-dev"
    ]

    [resources.database]
    type = "postgresql"
    
    [resources.nodejs]
    version = "24"
    
